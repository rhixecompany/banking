version: "3.8"

services:
  app:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-rhixecompany/banking}:${VERSION:-latest}
    build:
      context: .
      dockerfile: compose/production/node/Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://banking.example.com}
    env_file:
      - .envs/production/.env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
    secrets:
      - encryption_key
      - nextauth_secret
      - database_url
      - plaid_client_id
      - plaid_secret
      - dwolla_key
      - dwolla_secret
      - auth_github_id
      - auth_github_secret
      - auth_google_id
      - auth_google_secret
      - redis_url
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == worker
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - traefik-public
      - app-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.banking.rule=Host(`${DOMAIN:-banking.example.com}`)"
      - "traefik.http.routers.banking.entrypoints=websecure"
      - "traefik.http.routers.banking.tls=true"
      - "traefik.http.routers.banking.middlewares=security-headers,compress"
      - "traefik.http.services.banking.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-banking}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == worker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-internal
    secrets:
      - postgres_password

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      placement:
        constraints:
          - node.role == worker
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - app-internal

secrets:
  encryption_key:
    external: true
  nextauth_secret:
    external: true
  database_url:
    external: true
  plaid_client_id:
    external: true
  plaid_secret:
    external: true
  dwolla_key:
    external: true
  dwolla_secret:
    external: true
  auth_github_id:
    external: true
  auth_github_secret:
    external: true
  auth_google_id:
    external: true
  auth_google_secret:
    external: true
  redis_url:
    external: true
  postgres_password:
    external: true

volumes:
  postgres_data:
  redis_data:

networks:
  traefik-public:
    external: true
  app-internal:
    driver: overlay
    attachable: true
