name: Docker Compose Validation

on:
  push:
    branches: [main, develop]
    paths:
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.github/workflows/docker-compose.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'docker-compose.yml'
      - 'Dockerfile'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml syntax
        run: docker-compose config --quiet

      - name: Lint with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3009

  compose-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build with docker-compose
        run: docker-compose build --no-cache
        env:
          POSTGRES_PASSWORD: testpass
          REDIS_PASSWORD: testpass
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Start services with docker-compose
        run: docker-compose --profile init up -d
        timeout-minutes: 5
        env:
          POSTGRES_PASSWORD: testpass
          REDIS_PASSWORD: testpass
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:testpass@db:5432/banking

      - name: Wait for services to be healthy
        run: |
          for i in {1..30}; do
            docker-compose ps | grep -q 'healthy' && echo "Services healthy" && exit 0
            echo "Waiting... attempt $i/30"
            sleep 2
          done
          echo "Services did not become healthy"
          docker-compose logs
          exit 1

      - name: Verify app container is running
        run: docker-compose ps app | grep -q "Up"

      - name: Check database migrations completed
        run: docker-compose logs init | grep -q "success\|completed" || echo "Note: Check init logs if migrations expected"

      - name: Cleanup
        if: always()
        run: docker-compose down -v
