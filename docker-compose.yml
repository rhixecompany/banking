services:
  app:
    build:
      context: .
      dockerfile: compose/production/node/Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    env_file:
      - .envs/production/.env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    security_opt:
      - no-new-privileges:true
    develop:
      watch:
        - path: ./app
          action: rebuild
        - path: ./components
          action: rebuild
        - path: ./lib
          action: rebuild
        - path: ./database
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./drizzle.config.ts
          action: rebuild

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-banking}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - app-network
    security_opt:
      - no-new-privileges:true

  init:
    build:
      context: .
      dockerfile: compose/production/node/Dockerfile
      args:
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    env_file:
      - .envs/production/.env.production
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:push"
    networks:
      - app-network
    profiles:
      - init
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge

# Usage:
# Development: docker compose watch
# Production: docker compose --env-file .envs/production/.env.production up -d
# With migrations: docker compose --profile init --env-file .envs/production/.env.production up
# Test health: docker compose ps (check STATUS column)
# View logs: docker compose logs -f app
# Full cleanup: docker compose down -v
