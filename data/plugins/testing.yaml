name: Testing
repo: https://github.com/awesome-opencode/opencode-testing
tagline: Testing patterns - Vitest unit tests, Playwright E2E, component testing
description: >
  Opencode plugin providing testing patterns for production applications.

  Features:
  - Vitest unit test patterns
  - Server Action testing
  - DAL testing with mocks
  - Playwright E2E patterns
  - Component testing with Testing Library
  - Auth flow testing
  - API testing patterns

  Includes examples for banking application testing.
tags:
  - testing
  - vitest
  - playwright
  - e2e
  - unit-tests
  - integration-tests
scope:
  - project
  - global
min_version: "1.0.0"
installation: |
  ## Installation

  ```bash
  mkdir -p .opencode
  git clone https://github.com/awesome-opencode/opencode-testing.git .opencode/testing
  ```

  ## Usage

  - "Write test for register action"
  - "Add E2E test for login flow"
  - "Mock Plaid API in test"
  - "Test bank transfer flow"
