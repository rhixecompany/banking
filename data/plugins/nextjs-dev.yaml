name: NextJS Dev
repo: https://github.com/awesome-opencode/opencode-nextjs-dev
tagline: Next.js 16 App Router patterns, Suspense boundaries, and async auth best practices
description: >
  Opencode plugin providing agents and skills for Next.js 16 development. Includes
  guidance on Suspense boundaries for async auth to avoid blocking route rendering,
  Server Actions with proper Zod validation and error handling, DAL pattern
  enforcement to prevent N+1 queries, Zod-based environment validation, and
  TypeScript strict mode compliance. Helps developers implement protected routes,
  authentication flows, and database connectivity following production-ready patterns.

  Features:
  - SuspenseSkill: Handle async auth in Next.js 16 without blocking route rendering
  - ServerActionSkill: Zod validation, error handling, and revalidation patterns
  - DAL Skill: N+1 query prevention with JOIN patterns
  - NextJS Architect Agent: Pre-configured AI agent for code review and generation

  Based on production patterns from the Banking project template.
tags:
  - nextjs
  - react
  - typescript
  - server-actions
  - app-router
  - best-practices
  - suspense
  - auth
scope:
  - project
  - global
min_version: "1.0.0"
installation: |
  ## Project-Level Installation

  ```bash
  mkdir -p .opencode
  git clone https://github.com/awesome-opencode/opencode-nextjs-dev.git .opencode/nextjs-dev
  ```

  ## Global Installation

  ```bash
  git clone https://github.com/awesome-opencode/opencode-nextjs-dev.git ~/.config/opencode/nextjs-dev
  ```

  ## Usage

  The plugin provides:

  - **NextJS Architect Agent**: Reviews code for Next.js 16 patterns
  - **SuspenseSkill**: Teaches Suspense boundary patterns for auth
  - **ServerActionSkill**: Enforces Server Action conventions
  - **DalSkill**: Validates DAL queries for N+1 prevention

  ## Example Prompts

  - "Create a protected route with Suspense boundary"
  - "Add a Server Action for creating a user with Zod validation"
  - "Query user with profile using JOIN instead of N+1"
