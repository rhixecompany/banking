name: NextJS Architect
repo: https://github.com/awesome-opencode/opencode-nextjs-dev
tagline: AI architect agent for Next.js 16 App Router, Suspense boundaries, and Server Actions
description: >
  Pre-configured AI agent for Next.js 16 development. Specializes in App Router patterns,
  Suspense boundaries for async auth, Server Actions with Zod validation, DAL pattern
  enforcement (N+1 prevention), and TypeScript strict mode. Includes skills for:

  - SuspenseSkill: Handle async auth without blocking route rendering
  - ServerActionSkill: Zod validation and error handling
  - DalSkill: N+1 prevention with JOIN patterns

  Based on production patterns from the Banking project template.
tags:
  - nextjs
  - react
  - typescript
  - server-actions
  - app-router
  - architect
  - ai
scope:
  - project
  - global
min_version: "1.0.0"
installation: |
  ## Installation

  The NextJS Architect agent is included with the [NextJS Dev plugin](https://github.com/awesome-opencode/opencode-nextjs-dev).

  ```bash
  git clone https://github.com/awesome-opencode/opencode-nextjs-dev.git .opencode/nextjs-dev
  ```

  ## Usage

  The agent provides specialized assistance for:

  - Creating protected routes with Suspense boundaries
  - Implementing Server Actions with Zod validation
  - Preventing N+1 queries with DAL patterns
  - Reviewing code for Next.js 16 best practices

  ## Example Prompts

  - "Create a protected dashboard page with Suspense"
  - "Add a Server Action for user registration"
  - "Fix the N+1 query in getUserBanks"
