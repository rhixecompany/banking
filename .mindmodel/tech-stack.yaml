# Tech Stack Constraints

This file documents the technology versions and key dependencies used in the Banking project.

## Core Runtime

| Technology | Version | Notes |
|------------|---------|-------|
| Next.js | 16.2.2 | App Router, Server Components by default |
| React | 19 | Server Components default |
| TypeScript | 6.0.2 | strict mode enabled |
| Node.js | 18+ | Recommended |

